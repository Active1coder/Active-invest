<!DOCTYPE html>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

    <!-- NAVBAR -->
    <nav class="bg-white dark:bg-slate-900 border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-[#007BFF] rounded-2xl flex items-center justify-center text-white text-3xl font-bold logo-font">A</div>

    <!-- LOGIN MODAL -->

        <div class="bg-white dark:bg-slate-900 rounded-3xl p-10 max-w-md w-full mx-4">
            <h2 class="text-3xl font-semibold mb-8">Log in</h2>

            <input id="login-password" type="password" placeholder="Password" class="w-full px-6 py-5 rounded-3xl border dark:border-slate-700 mb-8">
            <button onclick="performLogin()" class="w-full py-5 bg-[#007BFF] text-white font-semibold rounded-3xl">Log In</button>
            <p onclick="switchToSignup()" class="text-center text-blue-600 cursor-pointer mt-4">Need an account? Sign up</p>
        </div>
    </div>

    <!-- SIGNUP MODAL -->
    <div id="signup-modal" class="hidden fixed inset-0 bg-black/70 z-[10000] flex items-center justify-center">
        <div class="bg-white dark:bg-slate-900 rounded-3xl p-10 max-w-md w-full mx-4">
            <h2 class="text-3xl font-semibold mb-8">Create Account</h2>
            <input id="signup-name" type="text" placeholder="Full Name" class="w-full px-6 py-5 rounded-3xl border dark:border-slate-700 mb-4">
            <input id="signup-email" type="email" placeholder="Email" class="w-full px-6 py-5 rounded-3xl border dark:border-slate-700 mb-4">
            <input id="signup-password" type="password" placeholder="Password (min 6 chars)" class="w-full px-6 py-5 rounded-3xl border dark:border-slate-700 mb-6">
            
            <label class="block text-sm mb-2">Preferred Currency</label>
            <select id="signup-currency" class="w-full px-6 py-5 rounded-3xl border dark:border-slate-700 mb-8">
                <option value="USD">$ USD</option>
                <option value="EUR">€ EUR</option>
                <option value="GBP">£ GBP</option>
                <option value="CAD">$ CAD</option>
                <option value="AUD">$ AUD</option>
            </select>
            
            <button onclick="performSignup()" class="w-full py-5 bg-[#007BFF] text-white font-semibold rounded-3xl">Create Account</button>
            <p onclick="switchToLogin()" class="text-center text-blue-600 cursor-pointer mt-4">Already have account? Log in</p>
        </div>
    </div>

    <!-- LIVE CHAT MODAL -->
    <div id="chat-modal" class="hidden fixed inset-0 bg-black/70 z-[10001] flex items-end lg:items-center justify-center">
        <div class="bg-white dark:bg-slate-900 w-full max-w-lg rounded-t-3xl lg:rounded-3xl max-h-[85vh] flex flex-col">
            <div class="p-6 border-b flex justify-between items-center">
                <div class="flex items-center gap-x-3">
                    <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center text-white text-2xl">👨‍💼</div>
                    <div>
                        <p class="font-semibold">Live Support</p>
                        <p class="text-xs text-emerald-600">Admin is online</p>
                    </div>

            </div>
            <div id="chat-body" class="flex-1 p-6 overflow-y-auto space-y-4"></div>
            <div class="p-4 border-t flex gap-3">
                <input id="chat-input" onkeypress="if(event.key==='Enter') sendChatMessage()" placeholder="Type message..." class="flex-1 px-6 py-4 rounded-3xl border dark:border-slate-700 focus:outline-none">
                <button onclick="sendChatMessage()" class="px-8 bg-[#007BFF] text-white rounded-3xl"><i class="fa-solid fa-paper-plane"></i></button>

<script>
// ==================== YOUR FIREBASE CONFIG (already inserted) ====================
const firebaseConfig = {
    apiKey: "AIzaSyA2CGkV-ZM5w_h_w8cJQ3FMclhAxOGb1AA",
    authDomain: "active-invest-fe0c1.firebaseapp.com",
    databaseURL: "https://active-invest-fe0c1-default-rtdb.firebaseio.com",
    projectId: "active-invest-fe0c1",
    storageBucket: "active-invest-fe0c1.firebasestorage.app",
    messagingSenderId: "957525655059",
    appId: "1:957525655059:web:caf32f61a1d53da91389e6",
    measurementId: "G-3SR9BV1ZSE"
};

// Initialize Firebase (Compatibility mode for auth + firestore)
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUserData = null;
let currentTab = 0;
let isDarkMode = false;
let chatListener = null;

// Show toast
function showToast(message, type = 'success') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `flex items-center gap-x-3 px-6 py-4 rounded-3xl shadow-2xl text-white ${type === 'success' ? 'bg-emerald-600' : 'bg-red-600'} toast`;
    toast.innerHTML = `
        <i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-triangle-exclamation'}"></i>
        <span class="font-medium">${message}</span>
    `;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 4500);
}

// Toggle dark mode
function toggleDarkMode() {
    isDarkMode = !isDarkMode;
    document.documentElement.classList.toggle('dark', isDarkMode);
}

// Render navigation
function renderNav() {
    const nav = document.getElementById('nav-right');
    if (!currentUserData) {
        nav.innerHTML = `
            <button onclick="toggleDarkMode()" class="px-4 py-2"><i class="fa-solid fa-moon text-xl"></i></button>
            <button onclick="showLoginModal()" class="px-6 py-2.5 font-medium border border-slate-300 dark:border-slate-700 rounded-3xl">Log in</button>
            <button onclick="showSignupModal()" class="px-6 py-2.5 bg-[#007BFF] text-white font-medium rounded-3xl">Sign up</button>
        `;
    } else {
        nav.innerHTML = `
            <button onclick="toggleDarkMode()" class="px-4 py-2"><i class="fa-solid fa-moon text-xl"></i></button>
            <div class="flex items-center gap-x-3 cursor-pointer" onclick="renderDashboard()">
                <div class="w-9 h-9 bg-[#007BFF] text-white rounded-2xl flex items-center justify-center font-bold">${currentUserData.name ? currentUserData.name[0].toUpperCase() : 'U'}</div>
                <div>
                    <p class="text-sm font-semibold">${currentUserData.name || 'User'}</p>
                    <p class="text-xs text-slate-500">${currentUserData.currency || 'USD'} ${currentUserData.walletBalance || 0}</p>
                </div>
            </div>
            <button onclick="logout()" class="ml-4 text-red-600"><i class="fa-solid fa-right-from-bracket"></i></button>
        `;
    }
}

// Main render
function renderApp() {
    renderNav();
    const main = document.getElementById('main-app');
    
    if (!currentUserData) {
        main.innerHTML = `
            <div class="hero-bg bg-gradient-to-br from-blue-700 to-indigo-700 text-white py-32 rounded-3xl text-center">
                <h1 class="text-7xl font-semibold logo-font tracking-tighter">Invest Smarter</h1>
                <p class="text-3xl mt-6 max-w-2xl mx-auto">A Digital Asset Investment Platform Built on Compliance, Security, and Strategic Growth.</p>
                <div class="mt-12 flex justify-center gap-6">
                    <button onclick="showSignupModal()" class="px-10 py-6 bg-white text-blue-700 font-semibold rounded-3xl text-xl">Start Investing Now</button>
                </div>
            </div>
        `;
        return;
    }
    
    main.innerHTML = `
        <div class="flex flex-col lg:flex-row gap-8">
            <div class="lg:w-72 bg-white dark:bg-slate-900 rounded-3xl p-6 shadow">
                <div class="logo-font text-3xl font-semibold text-[#007BFF] mb-10">Active Investment</div>
                <div class="space-y-2">
                    <div onclick="switchTab(0)" class="sidebar-tab flex items-center gap-3 px-6 py-4 rounded-3xl cursor-pointer ${currentTab === 0 ? 'tab-active' : ''}"><i class="fa-solid fa-gauge-high"></i> Dashboard</div>
                    <div onclick="switchTab(1)" class="sidebar-tab flex items-center gap-3 px-6 py-4 rounded-3xl cursor-pointer ${currentTab === 1 ? 'tab-active' : ''}"><i class="fa-solid fa-hand-holding-dollar"></i> Invest</div>
                    <div onclick="switchTab(2)" class="sidebar-tab flex items-center gap-3 px-6 py-4 rounded-3xl cursor-pointer ${currentTab === 2 ? 'tab-active' : ''}"><i class="fa-solid fa-wallet"></i> Fund Wallet</div>
                    <div onclick="switchTab(3)" class="sidebar-tab flex items-center gap-3 px-6 py-4 rounded-3xl cursor-pointer ${currentTab === 3 ? 'tab-active' : ''}"><i class="fa-solid fa-money-bill-transfer"></i> Withdraw</div>
                    <div onclick="switchTab(4)" class="sidebar-tab flex items-center gap-3 px-6 py-4 rounded-3xl cursor-pointer ${currentTab === 4 ? 'tab-active' : ''}"><i class="fa-solid fa-briefcase"></i> Portfolio</div>
                    <div onclick="switchTab(5)" class="sidebar-tab flex items-center gap-3 px-6 py-4 rounded-3xl cursor-pointer ${currentTab === 5 ? 'tab-active' : ''}"><i class="fa-solid fa-gear"></i> Settings</div>
                    ${currentUserData.role === 'admin' ? `<div onclick="switchTab(6)" class="sidebar-tab flex items-center gap-3 px-6 py-4 rounded-3xl cursor-pointer text-amber-600 ${currentTab === 6 ? 'tab-active' : ''}"><i class="fa-solid fa-user-shield"></i> Admin Panel</div>` : ''}
                </div>
                
                <div class="mt-auto pt-12">
                    <p class="uppercase text-xs text-slate-400 mb-4">Customer Care</p>
                    <a href="https://t.me/mymanagementteam09" target="_blank" class="block py-3 px-4 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-3xl flex items-center gap-3"><i class="fa-brands fa-telegram text-blue-500"></i> Telegram</a>
                    <a href="https://wa.me/15484772197" target="_blank" class="block py-3 px-4 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-3xl flex items-center gap-3"><i class="fa-brands fa-whatsapp text-green-500"></i> WhatsApp</a>
                    <button onclick="openChatModal()" class="mt-6 w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white rounded-3xl font-medium">Live Chat</button>
                </div>
            </div>
            
            <div id="content-area" class="flex-1"></div>
        </div>
    `;
    
    switchTab(0);
}

function switchTab(tab) {
    currentTab = tab;
    const area = document.getElementById('content-area');
    
    document.querySelectorAll('.sidebar-tab').forEach(el => el.classList.remove('tab-active'));
    const tabs = document.querySelectorAll('.sidebar-tab');
    if (tabs[tab]) tabs[tab].classList.add('tab-active');
    
    if (tab === 0) {
        area.innerHTML = `
            <div>
                <h1 class="text-4xl font-semibold">Welcome back, ${currentUserData.name || 'Investor'}!</h1>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-10">
                    <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl card-hover">
                        <p class="text-slate-500">Wallet Balance</p>
                        <p class="text-5xl font-semibold mt-4">${currentUserData.currency || 'USD'} ${currentUserData.walletBalance || 0}</p>
                    </div>
                    <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl card-hover">
                        <p class="text-slate-500">Investment Balance</p>
                        <p class="text-5xl font-semibold mt-4">${currentUserData.currency || 'USD'} ${currentUserData.investmentBalance || 0}</p>
                    </div>
                    <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl card-hover">
                        <p class="text-slate-500">Total Profit</p>
                        <p class="text-5xl font-semibold mt-4 text-emerald-600">+$${Math.round((currentUserData.investmentBalance || 0) * 0.35)}</p>
                    </div>
                </div>
            </div>
        `;
    } else if (tab === 1) {
        area.innerHTML = `
            <div class="max-w-lg">
                <h2 class="text-3xl font-semibold mb-8">Make an Investment</h2>
                <div class="bg-white dark:bg-slate-900 p-10 rounded-3xl">
                    <input id="invest-amount" type="number" placeholder="Amount" class="w-full px-6 py-6 text-4xl font-semibold rounded-3xl border dark:border-slate-700 focus:outline-none">
                    <button onclick="makeInvestment()" class="mt-10 w-full py-6 bg-[#007BFF] text-white font-semibold rounded-3xl text-lg">Invest Now</button>
                </div>
            </div>
        `;
    } else if (tab === 2) {
        area.innerHTML = `
            <div>
                <h2 class="text-3xl font-semibold mb-8">Fund Your Wallet</h2>
                <button onclick="simulateDeposit(5000)" class="px-10 py-4 bg-emerald-600 text-white rounded-3xl">Simulate $5,000 Deposit</button>
            </div>
        `;
    } else if (tab === 3) {
        area.innerHTML = `
            <div class="max-w-md bg-white dark:bg-slate-900 p-10 rounded-3xl">
                <h2 class="text-3xl font-semibold mb-8">Withdraw</h2>
                <input id="withdraw-amount" type="number" placeholder="Amount" class="w-full px-6 py-6 text-4xl font-semibold rounded-3xl border dark:border-slate-700 mb-8">
                <button onclick="submitWithdrawal()" class="w-full py-6 bg-red-600 text-white font-semibold rounded-3xl">Submit Request</button>
            </div>
        `;
    } else if (tab === 4) {
        area.innerHTML = `<div class="bg-white dark:bg-slate-900 p-10 rounded-3xl"><p class="text-5xl font-semibold">Portfolio Value: $${currentUserData.investmentBalance || 0}</p></div>`;
    } else if (tab === 5) {
        area.innerHTML = `<div class="max-w-md"><h2 class="text-3xl font-semibold mb-8">Settings</h2><p>Currency and password settings coming soon.</p></div>`;
    } else if (tab === 6 && currentUserData.role === 'admin') {
        area.innerHTML = `<div><h2 class="text-3xl font-semibold mb-8">Admin Panel</h2><p>Users and withdrawals management (expandable).</p></div>`;
    }
}

function makeInvestment() {
    const amount = parseFloat(document.getElementById('invest-amount').value) || 0;
    if (amount < 100) return showToast('Minimum $100', 'error');
    
    db.collection('users').doc(auth.currentUser.uid).update({
        walletBalance: firebase.firestore.FieldValue.increment(-amount),
        investmentBalance: firebase.firestore.FieldValue.increment(amount)
    }).then(() => {
        currentUserData.walletBalance = (currentUserData.walletBalance || 0) - amount;
        currentUserData.investmentBalance = (currentUserData.investmentBalance || 0) + amount;
        showToast(`$${amount} invested successfully!`);
        switchTab(4);
    });
}

function simulateDeposit(amount) {
    db.collection('users').doc(auth.currentUser.uid).update({
        walletBalance: firebase.firestore.FieldValue.increment(amount)
    }).then(() => {
        currentUserData.walletBalance = (currentUserData.walletBalance || 0) + amount;
        showToast(`$${amount} added to wallet`);
        switchTab(0);
    });
}

function submitWithdrawal() {
    const amount = parseFloat(document.getElementById('withdraw-amount').value) || 0;
    if (amount < 100) return showToast('Minimum withdrawal $100', 'error');
    
    db.collection('withdrawals').add({
        userId: auth.currentUser.uid,
        amount: amount,
        status: 'pending',
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => showToast('Withdrawal request submitted'));
}

function openChatModal() {
    document.getElementById('chat-modal').classList.remove('hidden');
    document.getElementById('chat-modal').classList.add('flex');
}

function hideChatModal() {
    document.getElementById('chat-modal').classList.add('hidden');
    document.getElementById('chat-modal').classList.remove('flex');
}

function sendChatMessage() {
    const input = document.getElementById('chat-input');
    if (!input.value.trim()) return;
    // In full version you would save to Firestore here
    showToast('Message sent to admin (demo)');
    input.value = '';
}

// Auth functions
function showLoginModal() { document.getElementById('login-modal').classList.remove('hidden'); document.getElementById('login-modal').classList.add('flex'); }
function showSignupModal() { document.getElementById('signup-modal').classList.remove('hidden'); document.getElementById('signup-modal').classList.add('flex'); }
function switchToSignup() { document.getElementById('login-modal').classList.add('hidden'); showSignupModal(); }
function switchToLogin() { document.getElementById('signup-modal').classList.add('hidden'); showLoginModal(); }

async function performLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    try {
        const cred = await auth.signInWithEmailAndPassword(email, password);
        await loadCurrentUser(cred.user);
        document.getElementById('login-modal').classList.add('hidden');
        showToast('Logged in successfully');
    } catch (e) { showToast(e.message, 'error'); }
}

async function performSignup() {
    const name = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const currency = document.getElementById('signup-currency').value;
    
    try {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        await db.collection('users').doc(cred.user.uid).set({
            name, email, currency, walletBalance: 0, investmentBalance: 0,
            role: email.includes('admin') ? 'admin' : 'user',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        await loadCurrentUser(cred.user);
        document.getElementById('signup-modal').classList.add('hidden');
        showToast('Account created successfully!');
    } catch (e) { showToast(e.message, 'error'); }
}

async function loadCurrentUser(user) {
    const doc = await db.collection('users').doc(user.uid).get();
    currentUserData = doc.exists ? doc.data() : { name: 'User', walletBalance: 0, investmentBalance: 0 };
    renderApp();
}

function logout() {
    auth.signOut().then(() => {
        currentUserData = null;
        renderApp();
        showToast('Logged out successfully');
    });
}

auth.onAuthStateChanged(user => {
    if (user) loadCurrentUser(user);
    else renderApp();
});

window.onload = () => {
    console.log('%c✅ Active Investment with your Firebase config is ready!', 'color:#007BFF;font-size:16px');
};
</script>
</body>
